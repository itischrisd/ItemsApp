spring:
  datasource:
    url: jdbc:h2:mem:items
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: false
  h2:
    console:
      enabled: true
  flyway:
    enabled: true
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
