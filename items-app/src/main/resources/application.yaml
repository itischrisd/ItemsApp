spring:
  application:
    name: items-app
  main:
    banner-mode: off
  datasource:
    url: jdbc:h2:mem:items
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    open-in-view: true
    hibernate:
      ddl-auto: create
  h2:
    console:
      enabled: true
